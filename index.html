<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">

        <title>Keyboard</title>

        <script src="js/safari.js"></script>
        <script src="js/window-size.js"></script>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.snow.css" rel="stylesheet">
        <link href="css/main.css" rel="stylesheet">
        <link href="css/editor-scrollbar.css" rel="stylesheet">
        <link id="selected-language-stylesheet" rel="stylesheet">

        <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.js"></script>
    </head>
    <body>

        <div id="editor-area">
            <div id="editor"></div>
        </div>

        <div id="tools">
            <div id="toolbars">
                <div id="toolbar">
                    <div id="quill-toolbar">
                        <button class="ql-bold"><i class="fas fa-bold"></i></button>
                        <button class="ql-underline"><i class="fas fa-underline"></i></button>
                        <button class="ql-italic"><i class="fas fa-italic"></i></button>
                        <button class="ql-indent" value="+1"><i class="fas fa-indent"></i></button>
                        <button class="ql-indent" value="-1"><i class="fas fa-outdent"></i></button>
                        <button class="ql-list" value="bullet"><i class="fas fa-list"></i></button>
                        <button class="ql-list" value="ordered"><i class="fas fa-list-ol"></i></button>
                        <!-- <button class="ql-strike"><i class="fas fa-strikethrough"></i></button> -->
                    </div>
                    <div id="custom-toolbar">
                        <!-- <button class="delete-text"><i class="fa fa-eraser"></i> <span class="translate" data-translate="erase all">Erase All</span></button> -->
                        <button class="cut-text"><i class="fas fa-cut"></i> <span class="translate capitalize" data-translate="cut all">Cut All</span></button>
                        <button class="copy-text"><i class="far fa-copy"></i> <span class="translate capitalize" data-translate="copy all">Copy All</span></button>
                    </div>
                </div>
            </div>

            <div id="suggestions-line">
                <div id="suggestions"></div>
            </div>
            <div id="keyboard"></div>
        </div>

        <script src="js/typewriter.js" type="module"></script>
    </body>
</html>
